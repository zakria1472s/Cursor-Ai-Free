<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="joke-card">
            <h1>😄 Joke Generator</h1>
            
            <div class="joke-display">
                <p id="jokeText" class="joke-text">Click the button to get a joke!</p>
                <p id="jokeType" class="joke-type"></p>
            </div>

            <div class="controls">
                <button id="getJokeBtn" class="btn btn-primary">Get Joke</button>
                <button id="copyBtn" class="btn btn-secondary" style="display: none;">Copy Joke</button>
            </div>

            <div class="category-selector">
                <label for="categorySelect">Category:</label>
                <select id="categorySelect">
                    <option value="">Any</option>
                    <option value="general">General</option>
                    <option value="knock-knock">Knock-Knock</option>
                    <option value="programming">Programming</option>
                </select>
            </div>

            <div class="joke-type-filter">
                <label>Joke Type:</label>
                <label class="checkbox-label">
                    <input type="radio" name="jokeType" value="single" checked> Single
                </label>
                <label class="checkbox-label">
                    <input type="radio" name="jokeType" value="twopart"> Two-Part
                </label>
                <label class="checkbox-label">
                    <input type="radio" name="jokeType" value="any"> Any
                </label>
            </div>

            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading joke...</p>
            </div>

            <div class="joke-history">
                <h3>Recent Jokes</h3>
                <ul id="historyList" class="history-list"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
